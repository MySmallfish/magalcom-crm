name: magalcom-crm-local

services:
  webapp:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.webapp
    container_name: magalcom-webapp
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Shell__ApiBaseUrl: http://localhost:7002
      Features__MiniAppsExternalOrigins: "false"
      Features__BiChatScaffold: "true"
      MiniApps__AllowedOrigins__0: http://localhost:7001
    ports:
      - "7001:8080"
    depends_on:
      - webapi

  dbdeploy:
    image: mcr.microsoft.com/dotnet/nightly/sdk:10.0
    container_name: magalcom-dbdeploy
    working_dir: /workspace
    entrypoint:
      - /bin/bash
      - /workspace/deploy/docker/sql/publish-local.sh
    environment:
      TARGET_CONNECTION_STRING: Server=sqlserver,1433;Database=MagalcomCrm;User ID=sa;Password=Your_strong_password123;TrustServerCertificate=True;Encrypt=False
    volumes:
      - ../..:/workspace
    depends_on:
      sqlserver:
        condition: service_started
    restart: "no"

  webapi:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.webapi
    container_name: magalcom-webapi
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DataAccess__Provider: SqlServer
      DataAccess__ConnectionString: Server=sqlserver,1433;Database=MagalcomCrm;User ID=sa;Password=Your_strong_password123;TrustServerCertificate=True;Encrypt=False
      Cors__AllowedOrigins__0: http://localhost:7001
      Features__MiniAppsExternalOrigins: "false"
      Features__BiChatScaffold: "true"
    ports:
      - "7002:8080"
    depends_on:
      dbdeploy:
        condition: service_completed_successfully

  backend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.backend
    container_name: magalcom-backend
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DataAccess__Provider: SqlServer
      DataAccess__ConnectionString: Server=sqlserver,1433;Database=MagalcomCrm;User ID=sa;Password=Your_strong_password123;TrustServerCertificate=True;Encrypt=False
    ports:
      - "7003:8080"
    depends_on:
      dbdeploy:
        condition: service_completed_successfully
      webapi:
        condition: service_started

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: magalcom-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Your_strong_password123"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

volumes:
  sqlserver_data:
