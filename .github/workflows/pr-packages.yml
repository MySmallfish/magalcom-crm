name: pr-packages

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          include-prerelease: true

      - name: Validate version bump for deployable changes
        run: ./deploy/package/check-version-bump.sh "${{ github.base_ref }}"

      - name: Restore
        run: dotnet restore src/Magalcom.Crm.sln

      - name: Build
        run: dotnet build src/Magalcom.Crm.sln -c Release --no-restore

      - name: Test
        run: dotnet test src/Magalcom.Crm.sln -c Release --no-build

  native-package:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          include-prerelease: true

      - name: Install archive tools
        run: sudo apt-get update && sudo apt-get install -y zip unzip

      - name: Create native deployment bundle
        env:
          BUILD_KIND: pr-preview
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_NUMBER: ${{ github.run_number }}
          COMMIT_SHA: ${{ github.sha }}
        run: ./deploy/package/create-native-bundle.sh

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-win-x64-${{ github.event.pull_request.number }}
          path: artifacts/packages/native/*/*.zip
          if-no-files-found: error

  docker-package:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          include-prerelease: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create docker deployment bundle
        env:
          BUILD_KIND: pr-preview
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_NUMBER: ${{ github.run_number }}
          COMMIT_SHA: ${{ github.sha }}
        run: ./deploy/package/create-docker-bundle.sh

      - name: Upload docker artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-linux-amd64-${{ github.event.pull_request.number }}
          path: artifacts/packages/docker/*/*.tar.gz
          if-no-files-found: error
