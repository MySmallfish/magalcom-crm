<style>
  :host {
    display: block;
    --sidebar-width: 280px;
    --sidebar-collapsed-width: 92px;
  }

  .layout {
    display: flex;
    min-height: 100vh;
    background: #ffffff;
    direction: ltr;
  }

  .sidebar {
    flex: 0 0 var(--sidebar-width);
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
    padding: 1.25rem 1rem;
    background: #ffffff;
    border-inline-start: 1px solid #d8e0ea;
    border-inline-end: 1px solid #d8e0ea;
    position: sticky;
    top: 0;
    height: 100vh;
    box-sizing: border-box;
    align-self: flex-start;
    transition: flex-basis 180ms ease, padding 180ms ease;
  }

  .sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.75rem;
    padding-bottom: 0.5rem;
  }

  .brand {
    display: flex;
    justify-content: flex-start;
    align-items: center;
    min-width: 0;
    flex: 1 1 auto;
  }

  .brand-logo {
    width: min(100%, 180px);
    height: auto;
    display: block;
  }

  .sidebar-toggle {
    width: 42px;
    height: 42px;
    border: 0;
    border-radius: 0.8rem;
    background: transparent;
    color: #29445d;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: color 120ms ease, background 120ms ease;
    flex: 0 0 auto;
  }

  .sidebar-toggle:hover {
    color: #0f172a;
    background: #f4f7fa;
  }

  .sidebar-toggle svg {
    inline-size: 20px;
    block-size: 20px;
  }

  .sidebar-menu {
    flex: 1;
    min-height: 0;
  }

  .sidebar-footer {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding-top: 1rem;
    border-top: 1px solid #e6edf4;
  }

  .profile-trigger {
    flex: 1;
    border: 0;
    background: transparent;
    color: #17314a;
    text-align: start;
    cursor: pointer;
    padding: 0;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    min-width: 0;
  }

  .profile-avatar {
    width: 42px;
    height: 42px;
    border-radius: 999px;
    border: 1px solid #d8e0ea;
    background: #f4f8fb;
    color: #17314a;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    flex: 0 0 auto;
  }

  .profile-meta {
    display: grid;
    gap: 0.15rem;
    min-width: 0;
    flex: 1 1 auto;
  }

  .profile-name {
    font-weight: 700;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .profile-email {
    color: #607487;
    font-size: 0.85rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .logout-button {
    width: 42px;
    height: 42px;
    border: 0;
    border-radius: 999px;
    background: transparent;
    color: #29445d;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: color 120ms ease, background 120ms ease;
  }

  .logout-button:hover {
    color: #0f172a;
    background: #f4f7fa;
  }

  .content {
    flex: 1 1 auto;
    min-width: 0;
    min-height: 100vh;
    display: flex;
    background: #ffffff;
  }

  .page {
    flex: 1 1 auto;
    display: flex;
    padding: 1.5rem 1.75rem;
    background: #ffffff;
  }

  .page.page-fullscreen {
    padding: 0;
  }

  .page-shell {
    display: grid;
    gap: 1.1rem;
    width: 100%;
    align-content: start;
  }

  .page-shell.page-shell-stretch {
    min-height: 100%;
    grid-template-rows: auto minmax(0, 1fr);
  }

  .page-shell.page-shell-headerless {
    grid-template-rows: minmax(0, 1fr);
  }

  .page-shell.page-shell-flush {
    gap: 0;
  }

  .page-header {
    display: grid;
    gap: 0.35rem;
  }

  .page-title {
    margin: 0;
    color: #17314a;
    font-size: clamp(1.8rem, 3vw, 2.35rem);
    line-height: 1.1;
  }

  .page-subtitle {
    margin: 0;
    max-width: 64rem;
    color: #607487;
    line-height: 1.6;
  }

  .page-body {
    display: grid;
    gap: 1rem;
  }

  .page-body.page-body-stretch {
    min-height: 0;
    height: 100%;
  }

  .page-body.page-body-flush {
    gap: 0;
  }

  .page-body > mc-miniapp-frame {
    display: block;
    min-height: 100%;
    height: 100%;
  }

  .content-card {
    border: 1px solid #d8e3eb;
    border-radius: 1rem;
    background: #ffffff;
    box-shadow: 0 18px 36px rgba(17, 33, 51, 0.05);
    padding: 1.1rem 1.2rem;
  }

  .toasts {
    position: fixed;
    inset-inline-end: 1rem;
    bottom: 1rem;
    display: grid;
    gap: 0.45rem;
    max-width: 360px;
    z-index: 30;
  }

  .toast {
    border: 1px solid #d8e0ea;
    border-radius: 0.55rem;
    background: #ffffff;
    box-shadow: 0 4px 14px rgba(10, 30, 50, 0.08);
    padding: 0.55rem 0.65rem;
    font-size: 0.84rem;
    color: #223b54;
    display: flex;
    justify-content: space-between;
    gap: 0.5rem;
  }

  .toast button {
    border: 0;
    background: transparent;
    color: #58748f;
    cursor: pointer;
  }

  :host([sidebar-collapsed]) .sidebar {
    flex-basis: var(--sidebar-collapsed-width);
    padding-inline: 0.75rem;
  }

  :host([sidebar-collapsed]) .brand {
    justify-content: center;
  }

  :host([sidebar-collapsed]) .brand-logo {
    width: 44px;
  }

  :host([sidebar-collapsed]) .sidebar-header {
    flex-direction: column;
    align-items: center;
  }

  :host([sidebar-collapsed]) .sidebar-footer {
    flex-direction: column;
    align-items: center;
    gap: 0.6rem;
  }

  :host([sidebar-collapsed]) .profile-meta {
    display: none;
  }

  :host([sidebar-collapsed]) .profile-trigger {
    justify-content: center;
    flex: 0 0 auto;
  }

  :host([dir="ltr"]) .layout {
    flex-direction: row;
  }

  :host([dir="rtl"]) .layout {
    flex-direction: row-reverse;
  }

  :host([dir="ltr"]) .sidebar,
  :host([dir="ltr"]) .content {
    direction: ltr;
  }

  :host([dir="rtl"]) .sidebar,
  :host([dir="rtl"]) .content {
    direction: rtl;
  }

  :host([dir="rtl"]) .profile-trigger {
    text-align: right;
  }

  @media (max-width: 900px) {
    .layout {
      flex-direction: column;
    }

    .sidebar {
      border-inline-start: 0;
      border-inline-end: 0;
      border-bottom: 1px solid #d8e0ea;
      position: static;
      height: auto;
    }

    :host([sidebar-collapsed]) .sidebar {
      flex-basis: auto;
      padding-inline: 1rem;
    }

    :host([sidebar-collapsed]) .sidebar-header,
    :host([sidebar-collapsed]) .sidebar-footer {
      flex-direction: row;
    }

    :host([sidebar-collapsed]) .brand {
      justify-content: flex-start;
    }

    :host([sidebar-collapsed]) .brand-logo {
      width: min(100%, 180px);
    }

    :host([sidebar-collapsed]) .profile-meta {
      display: grid;
    }

    .page {
      padding: 1.1rem 1rem 1.4rem;
    }

    .page.page-fullscreen {
      padding: 0;
    }
  }
</style>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <img class="brand-logo" src="https://magalcom.com/wp-content/uploads/magalcomlogo2026en.png" alt="Magalcom" data-brand-logo />
      </div>
      <button class="sidebar-toggle" type="button" data-sidebar-toggle>
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M4 6.5h16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
          <path d="M4 12h16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
          <path d="M4 17.5h16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
        </svg>
      </button>
    </div>

    <div class="sidebar-menu">
      <mc-side-menu></mc-side-menu>
    </div>

    <div class="sidebar-footer">
      <button class="profile-trigger" type="button" data-profile-trigger>
        <span class="profile-avatar" data-profile-avatar></span>
        <span class="profile-meta">
          <span class="profile-name" data-profile-name></span>
          <span class="profile-email" data-profile-email></span>
        </span>
      </button>
      <button class="logout-button" type="button" data-logout-button>
        <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M10 5H5v14h5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
          <path d="M14 8l4 4-4 4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
          <path d="M18 12H9" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      </button>
    </div>
  </aside>

  <div class="content">
    <main class="page" data-page-host></main>
  </div>

  <section class="toasts" data-toast-host></section>
</div>
