<style>
  :host {
    display: block;
  }

  .layout {
    display: flex;
    min-height: 100vh;
    background: #f3f6f9;
    direction: ltr;
  }

  .sidebar {
    flex: 0 0 280px;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
    padding: 1.25rem 1rem;
    background: #ffffff;
    border-inline-start: 1px solid #d8e0ea;
    border-inline-end: 1px solid #d8e0ea;
    position: sticky;
    top: 0;
    height: 100vh;
    box-sizing: border-box;
    align-self: flex-start;
  }

  .brand {
    display: flex;
    justify-content: center;
    align-items: center;
    padding-bottom: 0.5rem;
  }

  .brand-logo {
    width: 56px;
    height: 56px;
    display: block;
  }

  .sidebar-menu {
    flex: 1;
    min-height: 0;
  }

  .sidebar-footer {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding-top: 1rem;
    border-top: 1px solid #e6edf4;
  }

  .profile-trigger {
    flex: 1;
    border: 0;
    background: transparent;
    color: #17314a;
    text-align: start;
    cursor: pointer;
    padding: 0;
    display: grid;
    gap: 0.15rem;
  }

  .profile-name {
    font-weight: 700;
  }

  .profile-email {
    color: #607487;
    font-size: 0.85rem;
  }

  .logout-button {
    width: 42px;
    height: 42px;
    border: 1px solid #cdd8e3;
    border-radius: 999px;
    background: #f8fbfd;
    color: #29445d;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: border-color 120ms ease, color 120ms ease, background 120ms ease;
  }

  .logout-button:hover {
    border-color: #067d68;
    color: #025547;
    background: #eef8f5;
  }

  .content {
    flex: 1 1 auto;
    min-width: 0;
  }

  .page {
    padding: 1.5rem 1.75rem;
  }

  .page-shell {
    display: grid;
    gap: 1.1rem;
  }

  .page-header {
    display: grid;
    gap: 0.35rem;
  }

  .page-breadcrumb {
    margin: 0;
    color: #607487;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .page-title {
    margin: 0;
    color: #17314a;
    font-size: clamp(1.8rem, 3vw, 2.35rem);
    line-height: 1.1;
  }

  .page-subtitle {
    margin: 0;
    max-width: 64rem;
    color: #607487;
    line-height: 1.6;
  }

  .page-body {
    display: grid;
    gap: 1rem;
  }

  .content-card {
    border: 1px solid #d8e3eb;
    border-radius: 1rem;
    background: #ffffff;
    box-shadow: 0 18px 36px rgba(17, 33, 51, 0.05);
    padding: 1.1rem 1.2rem;
  }

  .toasts {
    position: fixed;
    inset-inline-end: 1rem;
    bottom: 1rem;
    display: grid;
    gap: 0.45rem;
    max-width: 360px;
    z-index: 30;
  }

  .toast {
    border: 1px solid #d8e0ea;
    border-radius: 0.55rem;
    background: #ffffff;
    box-shadow: 0 4px 14px rgba(10, 30, 50, 0.08);
    padding: 0.55rem 0.65rem;
    font-size: 0.84rem;
    color: #223b54;
    display: flex;
    justify-content: space-between;
    gap: 0.5rem;
  }

  .toast button {
    border: 0;
    background: transparent;
    color: #58748f;
    cursor: pointer;
  }

  :host([dir="ltr"]) .layout {
    flex-direction: row;
  }

  :host([dir="rtl"]) .layout {
    flex-direction: row-reverse;
  }

  :host([dir="ltr"]) .sidebar,
  :host([dir="ltr"]) .content {
    direction: ltr;
  }

  :host([dir="rtl"]) .sidebar,
  :host([dir="rtl"]) .content {
    direction: rtl;
  }

  :host([dir="rtl"]) .profile-trigger {
    text-align: right;
  }

  @media (max-width: 900px) {
    .layout {
      flex-direction: column;
    }

    .sidebar {
      border-inline-start: 0;
      border-inline-end: 0;
      border-bottom: 1px solid #d8e0ea;
      position: static;
      height: auto;
    }

    .page {
      padding: 1.1rem 1rem 1.4rem;
    }
  }
</style>

<div class="layout">
  <aside class="sidebar">
    <div class="brand">
      <img class="brand-logo" src="/assets/favicon.svg" alt="Magalcom" data-brand-logo />
    </div>

    <div class="sidebar-menu">
      <mc-side-menu></mc-side-menu>
    </div>

    <div class="sidebar-footer">
      <button class="profile-trigger" type="button" data-profile-trigger>
        <span class="profile-name" data-profile-name></span>
        <span class="profile-email" data-profile-email></span>
      </button>
      <button class="logout-button" type="button" data-logout-button>
        <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M10 5H5v14h5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
          <path d="M14 8l4 4-4 4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
          <path d="M18 12H9" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      </button>
    </div>
  </aside>

  <div class="content">
    <main class="page" data-page-host></main>
  </div>

  <section class="toasts" data-toast-host></section>
</div>
