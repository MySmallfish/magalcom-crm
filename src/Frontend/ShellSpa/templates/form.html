<style>
  :host {
    display: block;
    direction: inherit;
  }

  .form {
    background:
      linear-gradient(180deg, rgba(250, 252, 255, 0.98), rgba(242, 247, 252, 0.98));
    border: 1px solid #d5e0ea;
    border-radius: 1rem;
    padding: 1.1rem;
    box-shadow: 0 18px 36px rgba(17, 33, 51, 0.05);
  }

  .fields {
    display: grid;
    gap: 0.9rem 1rem;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  }

  label {
    display: grid;
    gap: 0.35rem;
    font-size: 0.82rem;
    color: #29445d;
    font-weight: 600;
  }

  .field-wide {
    grid-column: 1 / -1;
  }

  input,
  textarea,
  select {
    border: 1px solid #bfd0e0;
    border-radius: 0.65rem;
    padding: 0.7rem 0.8rem;
    font-size: 0.95rem;
    color: #17314a;
    background: rgba(255, 255, 255, 0.92);
  }

  textarea {
    resize: vertical;
    min-height: 5rem;
  }

  small {
    color: #5f758a;
    font-weight: 500;
    line-height: 1.4;
  }

  .actions {
    margin-top: 1rem;
    display: flex;
    justify-content: flex-end;
  }

  button {
    border: 1px solid #0a806e;
    border-radius: 999px;
    background: linear-gradient(135deg, #0a9078, #067d68);
    color: #ffffff;
    padding: 0.72rem 1.15rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 10px 20px rgba(10, 144, 120, 0.18);
  }

  @media (max-width: 720px) {
    .form {
      padding: 0.9rem;
    }

    .fields {
      grid-template-columns: 1fr;
    }
  }

  :host([dir="rtl"]) .actions {
    justify-content: flex-start;
  }
</style>

<form class="form" data-form>
  <section class="fields" data-form-fields></section>
  <div class="actions">
    <button type="submit" data-submit>Submit</button>
  </div>
</form>
