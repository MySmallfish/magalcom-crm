<style>
  :host {
    display: block;
    direction: inherit;
  }

  .grid {
    background: #ffffff;
    border: 1px solid #d8e0ea;
    border-radius: 1rem;
    overflow: hidden;
    margin-top: 0.8rem;
    box-shadow: 0 18px 36px rgba(17, 33, 51, 0.05);
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th,
  td {
    padding: 0.7rem 0.8rem;
    border-bottom: 1px solid #ecf0f4;
    text-align: start;
    vertical-align: top;
    font-size: 0.88rem;
  }

  th {
    background: linear-gradient(180deg, #f7fafc, #eef4f8);
    color: #2f4a62;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    position: sticky;
    top: 0;
  }

  tr:last-child td {
    border-bottom: none;
  }

  .row-selectable {
    cursor: pointer;
  }

  .row-selectable:hover td {
    background: #f7fbff;
  }

  .row-selected td {
    background: #e9f7f4;
  }

  .placeholder {
    padding: 0.8rem;
    color: #607487;
    font-size: 0.9rem;
    font-style: italic;
  }

  :host([dir="rtl"]) th,
  :host([dir="rtl"]) td {
    text-align: right;
  }
</style>

<section class="grid">
  <table>
    <thead data-grid-head></thead>
    <tbody data-grid-body></tbody>
  </table>
  <div class="placeholder" data-grid-placeholder hidden>No records</div>
</section>
