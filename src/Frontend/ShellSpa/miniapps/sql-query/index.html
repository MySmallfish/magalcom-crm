<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SQL Query Mini App</title>
    <style>
      :root {
        --bg: #f3f6f9;
        --card: #ffffff;
        --border: #d8e0ea;
        --accent: #067d68;
        --text: #17314a;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }

      .page {
        min-height: 100vh;
        padding: 1rem;
        display: grid;
        gap: 0.75rem;
        box-sizing: border-box;
      }

      .card {
        border: 1px solid var(--border);
        border-radius: 1rem;
        background: var(--card);
        box-shadow: 0 18px 36px rgba(17, 33, 51, 0.05);
        padding: 1rem;
      }

      .title {
        margin: 0;
        font-size: 1.3rem;
      }

      .subtitle {
        margin: 0.2rem 0 0;
        color: #607487;
        font-size: 0.9rem;
      }

      .status {
        color: #607487;
        font-size: 0.9rem;
        margin: 0.75rem 0 0;
      }

      label {
        display: grid;
        gap: 0.4rem;
        font-weight: 600;
      }

      textarea {
        width: 100%;
        min-height: 220px;
        border: 1px solid #bfd0e0;
        border-radius: 0.65rem;
        padding: 0.65rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 0.92rem;
        resize: vertical;
      }

      .actions {
        margin-top: 0.75rem;
        display: flex;
        gap: 0.6rem;
        align-items: center;
      }

      button {
        border: 1px solid var(--accent);
        border-radius: 999px;
        background: linear-gradient(135deg, #0a9078, #067d68);
        color: #fff;
        font-weight: 700;
        cursor: pointer;
        padding: 0.55rem 0.95rem;
      }

      button[disabled] {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .output {
        overflow: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        border-bottom: 1px solid #edf1f6;
        padding: 0.5rem 0.6rem;
        text-align: start;
        font-size: 0.88rem;
        vertical-align: top;
      }

      th {
        background: #f7fafc;
        color: #2f4a62;
        font-size: 0.76rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .muted {
        color: #607487;
        font-size: 0.9rem;
      }

      .toolbar {
        display: flex;
        justify-content: space-between;
        gap: 0.5rem;
        align-items: center;
      }

      .badge {
        display: inline-flex;
        border-radius: 999px;
        font-size: 0.74rem;
        padding: 0.2rem 0.55rem;
        border: 1px solid #c6d3df;
        background: #ecf3ff;
        color: #24538a;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h1 class="title">SQL Query Mini App</h1>
        <p class="subtitle">Execute SQL queries against the connected CRM database.</p>
        <p class="status" id="status">Waiting for shell context...</p>
      </section>

      <section class="card">
        <form id="query-form">
          <label>
            SQL Statement
        <textarea id="query-input" spellcheck="false" placeholder="SELECT TOP 100 * FROM crm.ProjectView"></textarea>
          </label>
          <p class="muted" id="query-meta">Write queries (INSERT/UPDATE/DELETE/MERGE) require consent per session.</p>
          <div class="actions">
            <button id="run-button" type="submit">Run Query</button>
            <button id="clear-button" type="button">Clear</button>
          </div>
        </form>
      </section>

      <section class="card">
        <div class="toolbar">
          <strong>Result</strong>
          <span class="badge" id="consent-badge">Write consent: not granted</span>
        </div>
        <div class="output" id="output">
          <p class="muted">No query executed yet.</p>
        </div>
      </section>
    </main>

    <script type="module" src="/miniapps/sql-query/sql-query.js"></script>
  </body>
</html>
